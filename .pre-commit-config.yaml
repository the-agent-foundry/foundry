repos:
  - repo: local
    hooks:
      - id: foundry-sanitize-scan
        name: Foundry sanitization scan
        entry: python3 gates/scripts/sanitize_scan.py .
        language: system
        pass_filenames: false

      - id: foundry-format-lint
        name: Foundry format lint
        entry: python3 gates/scripts/format_lint.py .
        language: system
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
