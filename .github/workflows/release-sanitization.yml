name: release-sanitization

# Maintainer-run deeper scan before public release tags, major announcements, or
# large community imports. This is intentionally manual so public fork PRs do not
# trigger heavier history scans.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-sanitization:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sanitizer unit tests
        run: python3 -m unittest discover -s gates/tests -v

      - name: Foundry sanitization scan
        run: python3 gates/scripts/sanitize_scan.py .

      - name: Format lint
        run: python3 gates/scripts/format_lint.py .

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION="8.30.1"
          ASSET="gitleaks_${VERSION}_linux_x64.tar.gz"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          curl -sSfL "${BASE}/${ASSET}" -o "/tmp/${ASSET}"
          curl -sSfL "${BASE}/gitleaks_${VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          grep "  ${ASSET}$" /tmp/gitleaks_checksums.txt > /tmp/gitleaks_linux_x64.sha256
          (cd /tmp && sha256sum -c /tmp/gitleaks_linux_x64.sha256)
          tar -xzf "/tmp/${ASSET}" -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks full-history scan (redacted)
        run: gitleaks detect --source . --redact
